name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

# Permite cancelar runs antigos no mesmo PR/branch.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"
  FLUTTER_VERSION: "3.24.5"

jobs:
  # ──────────────────────────────────────────────────────────
  #  API (Django + Ninja + Pytest)
  # ──────────────────────────────────────────────────────────
  api:
    name: api · lint + tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: flashmind
          POSTGRES_USER: flash
          POSTGRES_PASSWORD: secret
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U flash -d flashmind"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DJANGO_SETTINGS_MODULE: config.settings
      DJANGO_DEBUG: "false"
      DJANGO_SECRET_KEY: ci-secret-key-not-used-in-prod
      DJANGO_ALLOWED_HOSTS: "*"
      DATABASE_URL: postgres://flash:secret@localhost:5432/flashmind
      REDIS_URL: redis://localhost:6379/0
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_DB: flashmind
      POSTGRES_USER: flash
      POSTGRES_PASSWORD: secret
      JWT_ACCESS_TOKEN_LIFETIME_MINUTES: "15"
      JWT_REFRESH_TOKEN_LIFETIME_DAYS: "7"
      TEMPORAL_ADDRESS: localhost:7233
      TEMPORAL_NAMESPACE: default
      TEMPORAL_TASK_QUEUE: ci-queue
      GROQ_API_KEY: ""

    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: apps/api/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Migrate (idempotent)
        run: python manage.py migrate --noinput

      - name: Run tests with coverage
        run: |
          pytest -v --maxfail=5 \
            --cov=apps --cov=config \
            --cov-report=term-missing \
            --cov-report=xml

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage
          path: apps/api/coverage.xml
          if-no-files-found: ignore

  # ──────────────────────────────────────────────────────────
  #  Web (Next.js)
  # ──────────────────────────────────────────────────────────
  web:
    name: web · lint + type-check + build
    runs-on: ubuntu-latest
    timeout-minutes: 12

    defaults:
      run:
        working-directory: apps/web

    env:
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build

  # ──────────────────────────────────────────────────────────
  #  Mobile (Flutter) — analyze only (sem rodar testes do app)
  # ──────────────────────────────────────────────────────────
  mobile:
    name: mobile · analyze
    runs-on: ubuntu-latest
    timeout-minutes: 12

    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Pub get
        run: flutter pub get

      - name: Generate Drift code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Format check
        run: dart format --output=none --set-exit-if-changed lib

      - name: Analyze
        run: flutter analyze --no-fatal-infos

  # ──────────────────────────────────────────────────────────
  #  Worker (apenas validação de sintaxe/imports)
  # ──────────────────────────────────────────────────────────
  worker:
    name: worker · syntax check
    runs-on: ubuntu-latest
    timeout-minutes: 6

    defaults:
      run:
        working-directory: apps/workers

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: apps/workers/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile (py_compile)
        run: |
          python -m py_compile worker.py django_setup.py
          python -m py_compile activities/*.py workflows/*.py
