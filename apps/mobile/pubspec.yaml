name: flashmind_mobile
description: FlashMind — app móvel (Flutter, offline-first).
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Routing
  go_router: ^14.2.7

  # Network
  dio: ^5.7.0

  # Local DB (SQLite via Drift)
  drift: ^2.20.3
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0

  # Secrets
  flutter_secure_storage: ^9.2.2

  # Connectivity
  connectivity_plus: ^6.0.5

  # Utils
  intl: ^0.19.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.20.3
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  assets:
    - assets/bolt.png
