# FlashMind — ambiente de desenvolvimento.
# Subir tudo:  docker compose up
# Derrubar:    docker compose down
# Limpar:      docker compose down -v

services:
  # ─── PostgreSQL 16 ─────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: flashmind-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-flashmind}
      POSTGRES_USER: ${POSTGRES_USER:-flash}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-flash} -d ${POSTGRES_DB:-flashmind}"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ─── Redis 7 ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: flashmind-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ─── API Django + Ninja ────────────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: flashmind-api
    command:
      - python
      - manage.py
      - runserver
      - 0.0.0.0:8000
    volumes:
      - ./apps/api:/app
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      DATABASE_URL: postgres://${POSTGRES_USER:-flash}:${POSTGRES_PASSWORD:-secret}@db:5432/${POSTGRES_DB:-flashmind}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/v1/health/"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ─── Web (Next.js 14) ──────────────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: flashmind-web
    command: npm run dev
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
      - NEXT_PUBLIC_APP_URL=http://localhost:3000

  # ─── Temporal Server (com auto-setup usando o mesmo Postgres) ──
  temporal:
    image: temporalio/auto-setup:1.25.2
    container_name: flashmind-temporal
    environment:
      DB: postgres12
      DB_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-flash}
      POSTGRES_PWD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_SEEDS: db
      DBNAME: temporal
      VISIBILITY_DBNAME: temporal_visibility
    ports:
      - "7233:7233"
    depends_on:
      db:
        condition: service_healthy

  # ─── Worker Temporal (Groq + activities Django) ────────────
  worker:
    build:
      context: .
      dockerfile: apps/workers/Dockerfile
    container_name: flashmind-worker
    volumes:
      - ./apps/workers:/app
      - ./apps/api:/api
    env_file: .env
    environment:
      PYTHONPATH: /api:/app
      DJANGO_SETTINGS_MODULE: config.settings
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      DATABASE_URL: postgres://${POSTGRES_USER:-flash}:${POSTGRES_PASSWORD:-secret}@db:5432/${POSTGRES_DB:-flashmind}
      REDIS_URL: redis://redis:6379/0
      TEMPORAL_HOST: temporal
      TEMPORAL_PORT: "7233"
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: default
      TEMPORAL_TASK_QUEUE: flashmind-queue
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      temporal:
        condition: service_started
    restart: unless-stopped

  # ─── Temporal Web UI ───────────────────────────────────────
  temporal-ui:
    image: temporalio/ui:2.30.1
    container_name: flashmind-temporal-ui
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000
    ports:
      - "8080:8080"
    depends_on:
      - temporal

  # ─── Test runner — API ─────────────────────────────────────
  # Roda os testes de integração sem precisar subir o stack todo.
  # Uso:
  #   docker compose --profile test run --rm test-api
  #   docker compose --profile test run --rm test-api pytest -v --cov=apps --cov-report=term-missing
  test-api:
    profiles: [test]
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    command: ["pytest", "-v", "--tb=short"]
    volumes:
      - ./apps/api:/app
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
      DJANGO_SECRET_KEY: test-insecure-key-not-for-production
      DJANGO_DEBUG: "true"
      DJANGO_ALLOWED_HOSTS: "*"
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-flashmind}
      POSTGRES_USER: ${POSTGRES_USER:-flash}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      DATABASE_URL: postgres://${POSTGRES_USER:-flash}:${POSTGRES_PASSWORD:-secret}@db:5432/${POSTGRES_DB:-flashmind}
      REDIS_URL: redis://redis:6379/0
      JWT_ACCESS_TOKEN_LIFETIME_MINUTES: "15"
      JWT_REFRESH_TOKEN_LIFETIME_DAYS: "7"
      TEMPORAL_ADDRESS: "localhost:7233"
      TEMPORAL_NAMESPACE: "default"
      TEMPORAL_TASK_QUEUE: "test-queue"
      GROQ_API_KEY: ""
      CORS_ALLOWED_ORIGINS: "http://localhost:3000"
      EMAIL_BACKEND: "django.core.mail.backends.locmem.EmailBackend"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
